name: staging-preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dndcrime-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - name: Build frontend
        working-directory: frontend
        run: yarn install --frozen-lockfile && yarn build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Test and build backend
        working-directory: backend
        run: |
          go test ./...
          CGO_ENABLED=0 go build -o server ./cmd/server
      - name: Configure restricted SSH keys
        env:
          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
          CONTROL_KEY: ${{ secrets.STAGING_CONTROL_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          printf '%s\n' "$CONTROL_KEY" > ~/.ssh/control_key
          chmod 600 ~/.ssh/deploy_key ~/.ssh/control_key
          echo '${{ vars.DEPLOY_HOST }} ${{ vars.DEPLOY_HOSTKEY }}' > ~/.ssh/known_hosts
      - name: Upload staging artifacts
        run: |
          RSYNC_SSH="ssh -i ~/.ssh/deploy_key -o ControlPath=none"
          rsync -az --delete -e "$RSYNC_SSH" frontend/dist/ gistrec@${{ vars.DEPLOY_HOST }}:frontend/dist/
          rsync -az -e "$RSYNC_SSH" backend/server gistrec@${{ vars.DEPLOY_HOST }}:backend/server
          rsync -az -e "$RSYNC_SSH" ecosystem.config.js gistrec@${{ vars.DEPLOY_HOST }}:ecosystem.config.js
          rsync -az -e "$RSYNC_SSH" deploy/refresh-staging-db.sh gistrec@${{ vars.DEPLOY_HOST }}:deploy/refresh-staging-db.sh
      - name: Refresh production data and restart staging
        run: ssh -i ~/.ssh/control_key -o ControlPath=none gistrec@${{ vars.DEPLOY_HOST }} deploy
      - name: Update staging comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- dndcrime-staging -->';
            const body = `${marker}\n✅ Staging deployed: https://dnd-crime-staging.gistrec.cloud/`;
            const issue_number = context.issue.number;
            const { data } = await github.rest.issues.listComments({ ...context.repo, issue_number, per_page: 100 });
            const old = data.find(c => c.body?.includes(marker));
            old
              ? await github.rest.issues.updateComment({ ...context.repo, comment_id: old.id, body })
              : await github.rest.issues.createComment({ ...context.repo, issue_number, body });

  visual-diff:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - working-directory: frontend
        run: yarn install --frozen-lockfile
      - id: playwright
        working-directory: frontend
        run: |
          VERSION=$(node -p "require('playwright-core/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        id: chromium-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.playwright.outputs.version }}
      - if: steps.chromium-cache.outputs.cache-hit != 'true'
        run: npx playwright@${{ steps.playwright.outputs.version }} install chromium --with-deps
      - if: steps.chromium-cache.outputs.cache-hit == 'true'
        run: npx playwright@${{ steps.playwright.outputs.version }} install chromium
      - name: Capture all routes
        working-directory: frontend
        run: node scripts/visual-diff.mjs --baseline https://dnd-crime.gistrec.cloud --current https://dnd-crime-staging.gistrec.cloud --out /tmp/diff --token "$VISUAL_TOKEN"
        env:
          VISUAL_TOKEN: ${{ secrets.VISUAL_TEST_AUTH_TOKEN }}
      - id: upload
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_S3_SECRET_ACCESS_KEY }}
          AWS_REGION: ru-central1
          PR: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          PREFIX="visual-diffs/app/pr-${PR}/${SHA:0:7}"
          aws s3 sync /tmp/diff "s3://dnd-crime/${PREFIX}/" --endpoint-url https://storage.yandexcloud.net --no-progress --only-show-errors
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
      - uses: actions/github-script@v7
        env:
          PREFIX: ${{ steps.upload.outputs.prefix }}
          REPORT: /tmp/diff/report.tsv
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- dndcrime-visual-diff -->';
            const base = `https://storage.yandexcloud.net/dnd-crime/${process.env.PREFIX}`;
            const rows = fs.readFileSync(process.env.REPORT, 'utf8').trim().split('\n').map(line => line.split('\t'));
            const row = ([route, viewport, pct, stem]) => `| \`${route}\` | ${viewport} | ${pct}% | [Open](${base}/${stem}.html) | [Open](${base}/${stem}--diff.png) |`;
            const header = ['| Route | Viewport | Changed | Slider | Pixel diff |', '| --- | --- | ---: | --- | --- |'];
            const table = (list) => [...header, ...list.map(row)].join('\n');
            const changed = rows.filter(r => parseFloat(r[2]) > 0).sort((a, b) => parseFloat(b[2]) - parseFloat(a[2]));
            const unchanged = rows.filter(r => parseFloat(r[2]) === 0);
            const parts = [marker, '🎨 **Visual diff: production → this PR**', ''];
            parts.push(changed.length ? `**${changed.length} changed** of ${rows.length} snapshots` : '✅ No visual changes.');
            if (changed.length) parts.push('', table(changed));
            if (unchanged.length) parts.push('', `<details><summary>Unchanged (${unchanged.length})</summary>`, '', table(unchanged), '', '</details>');
            parts.push('', 'Public snapshots are removed by the 30-day bucket lifecycle policy.');
            const body = parts.join('\n');
            const issue_number = context.issue.number;
            const { data } = await github.rest.issues.listComments({ ...context.repo, issue_number, per_page: 100 });
            const old = data.find(c => c.body?.includes(marker));
            old
              ? await github.rest.issues.updateComment({ ...context.repo, comment_id: old.id, body })
              : await github.rest.issues.createComment({ ...context.repo, issue_number, body });

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env.test
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_DEV_AUTH_STUB: "true"
        VITE_DEV_AUTH_ALLOW_BUILD: "true"
        VITE_SUPABASE_URL: "https://placeholder.supabase.co"
        VITE_SUPABASE_ANON_KEY: "placeholder-key"
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
